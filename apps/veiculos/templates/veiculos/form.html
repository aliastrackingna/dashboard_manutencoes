{% extends "base.html" %}
{% block title %}{{ titulo }} — Frotas{% endblock %}

{% block content %}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold mb-6">{{ titulo }}</h1>

    <form method="post" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label for="{{ field.id_for_label }}" class="block text-sm font-medium mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p class="text-xs text-red-500 mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div class="flex gap-3 pt-4">
            <button type="submit"
                    class="bg-primary hover:bg-primary-dark text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                Salvar
            </button>
            <a href="{% url 'veiculos:lista' %}"
               class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 py-2 px-6 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
