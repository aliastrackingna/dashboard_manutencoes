{% extends "base.html" %}
{% block title %}Oficinas — Manutenção Frota{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Oficinas</h1>
</div>

<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-6">
    <form method="get" class="flex flex-wrap gap-3">
        <input type="text" name="q" value="{{ q }}" placeholder="Buscar oficina..."
               class="flex-1 min-w-[200px] rounded-lg border border-gray-300 bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-white px-3 py-2 text-sm">
        <button type="submit" class="bg-gray-100 dark:bg-gray-700 px-4 py-2 rounded-lg text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            Filtrar
        </button>
    </form>
</div>

<p class="text-sm text-gray-400 mb-4">{{ total }} oficina(s) encontrada(s)</p>

<div class="space-y-2">
    {% for oficina in oficinas %}
    <a href="{% url 'manutencoes:oficina_detalhe' oficina %}"
       class="block bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 hover:border-primary transition-colors">
        <div class="flex items-center justify-between">
            <span class="font-semibold text-sm">{{ oficina }}</span>
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
    </a>
    {% empty %}
    <p class="text-gray-400 text-sm text-center py-8">Nenhuma oficina encontrada.</p>
    {% endfor %}
</div>
{% endblock %}
