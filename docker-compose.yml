services:
  dashboard_web:
    build:
      context: .
      dockerfile: Dockerfile
    image: dashboard-dashboard
    container_name: dashboard-web
    restart: unless-stopped
    environment:
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-in-production}
      - DEBUG=${DJANGO_DEBUG:-False}
      - ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DB_PATH=/app/data/db_dashboard.sqlite3
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
      - dados:/app/data
    networks:
      - dashboard-network

  dashboard_nginx:
    build: ./nginx
    container_name: dashboard-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
      - mediafiles:/app/media:ro
    networks:
      - dashboard-network
    depends_on:
      - dashboard_web

networks:
  dashboard-network:
    driver: bridge

volumes:
  staticfiles:
  mediafiles:
  dados:
