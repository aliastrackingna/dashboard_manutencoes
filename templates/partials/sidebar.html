<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="closeSidebar()"></div>
<aside id="sidebar" class="w-56 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto
    fixed top-16 left-0 bottom-0 z-40 -translate-x-full transition-transform duration-200 ease-in-out
    md:static md:translate-x-0 md:block">
    <nav class="p-4 space-y-1">
        {% with request.resolver_match.url_name as current %}
        <a href="{% url 'dashboard:index' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                  {% if current == 'index' %}bg-blue-50 text-primary dark:bg-blue-900/30 dark:text-blue-400
                  {% else %}text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
            Dashboard
        </a>
        <a href="{% url 'veiculos:lista' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'veiculos' in request.path %}bg-blue-50 text-primary dark:bg-blue-900/30 dark:text-blue-400
                  {% else %}text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m14 0V9a1 1 0 00-.553-.894l-4-2A1 1 0 0012 6H9"/></svg>
            Veículos
        </a>
        <a href="{% url 'importacao:upload' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'importacao' in request.path %}bg-blue-50 text-primary dark:bg-blue-900/30 dark:text-blue-400
                  {% else %}text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            Importação
        </a>
        <a href="{% url 'pesquisa:itens' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'pesquisa' in request.path %}bg-blue-50 text-primary dark:bg-blue-900/30 dark:text-blue-400
                  {% else %}text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            Pesquisa Itens
        </a>
        <a href="{% url 'configuracoes:kpis' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'configuracoes' in request.path %}bg-blue-50 text-primary dark:bg-blue-900/30 dark:text-blue-400
                  {% else %}text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Configurações
        </a>
        {% endwith %}
    </nav>
</aside>
