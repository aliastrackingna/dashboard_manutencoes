<nav class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 shadow-sm">
    <div class="flex items-center gap-3">
        <a href="{% url 'dashboard:index' %}" class="text-xl font-bold text-primary dark:text-blue-400">
            Frotas
        </a>
        <span class="text-sm text-gray-500 dark:text-gray-400">Dashboard de Manutenção</span>
    </div>

    <div class="flex items-center gap-4">
        <button id="theme-toggle" type="button"
                class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 transition-colors"
                title="Alternar tema"
                onclick="(function(){
                    var html = document.documentElement;
                    var nowDark = !html.classList.contains('dark');
                    html.classList.toggle('dark', nowDark);
                    localStorage.setItem('theme', nowDark ? 'dark' : 'light');
                    var iconLight = document.getElementById('theme-icon-light');
                    var iconDark = document.getElementById('theme-icon-dark');
                    if (nowDark) { iconLight.classList.remove('hidden'); iconDark.classList.add('hidden'); }
                    else { iconLight.classList.add('hidden'); iconDark.classList.remove('hidden'); }
                    if (window.atualizarCoresCharts) window.atualizarCoresCharts();
                })()">
            <svg id="theme-icon-light" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
            </svg>
            <svg id="theme-icon-dark" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
            </svg>
        </button>
    </div>
</nav>
