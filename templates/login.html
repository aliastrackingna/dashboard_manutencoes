{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Manutenção Frota</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark,.dark *));
        
        @theme {
            --color-primary: #2563eb;
            --color-primary-dark: #1d4ed8;
            --color-success: #16a34a;
            --color-warning: #d97706;
            --color-danger: #dc2626;
        }
    </style>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 flex items-center justify-center">
    <div class="fixed top-4 right-4">
        {% include "partials/theme_toggle.html" %}
    </div>
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-primary">Manutenção Frota</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Dashboard de Manutenção</p>
            </div>

            {% if form.errors %}
            <div class="mb-4 p-4 bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-200 rounded-lg text-sm">
                Usuário ou senha incorretos.
            </div>
            {% endif %}

            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Usuário
                    </label>
                    <input type="text" name="username" id="id_username" required
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Senha
                    </label>
                    <input type="password" name="password" id="id_password" required
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
